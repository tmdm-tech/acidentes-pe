services:
  - type: web
    name: acidentes-pe
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "sh -c 'python -m gunicorn server:app --bind 0.0.0.0:${PORT:-8000}'"
    healthCheckPath: /health
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: REQUIRE_PERSISTENT_STORAGE
        value: "false"
    disk:
      name: acidentes-pe-data
      mountPath: /var/data
      sizeGB: 1
