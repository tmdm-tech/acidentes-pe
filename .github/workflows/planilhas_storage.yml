name: Gerar Planilhas de Storage

on:
  push:
    branches: ["main"]
    paths:
      - "observa_backup/accidents_latest.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gerar-planilhas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar planilhas CSV
        run: |
          python scripts/generate_storage_spreadsheets.py \
            --input observa_backup/accidents_latest.json \
            --output-dir planilhas \
            --allow-missing

      - name: Commit das planilhas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add planilhas/*.csv
          git diff --cached --quiet || git commit -m "Atualiza planilhas automaticas de storage"
          git push