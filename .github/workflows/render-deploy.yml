name: Deploy Render

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "RENDER_API_KEY e RENDER_SERVICE_ID precisam estar configurados nos GitHub Secrets."
            exit 1
          fi

          response=$(curl -sS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json")

          echo "Resposta Render: ${response}"

          deploy_id=$(echo "${response}" | sed -n 's/.*"id":"\([^"]*\)".*/\1/p')
          if [ -z "${deploy_id}" ]; then
            echo "Nao foi possivel identificar deploy_id na resposta da API."
            exit 1
          fi

          echo "Deploy iniciado com id: ${deploy_id}"
